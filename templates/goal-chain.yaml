chain_id: demo_sequential_chain
title: Demo Sequential Goal Chain
objective: Make one small validated improvement to the fake app.
lane: demo
default_workflow: narrow_implementation
goals:
  - goal_id: audit_current_state
    title: Audit current state
    objective: Inspect the current fake-app behavior, constraints, and tests.
    workflow: audit
    lane: demo
    depends_on:
    allowed_paths:
      - examples/fake-app
      - runs/build_chains
      - reports/completions
    forbidden_paths:
      - .env
      - secrets
      - private
      - runtime/production
    acceptance_criteria:
      - Current state and constraints are identified.
      - No implementation changes are made during audit.
    test_commands:
      - python -m pytest examples/fake-app/tests
    proof_required:
      - context_pack.md
      - receipt.json
    stop_conditions:
      - Wrong worktree or branch.
      - Forbidden path or private data would be touched.
  - goal_id: implement_small_change
    title: Implement small change
    objective: Implement one bounded fake-app change after audit.
    workflow: narrow_implementation
    lane: demo
    depends_on:
      - audit_current_state
    allowed_paths:
      - examples/fake-app
      - runs/build_chains
      - reports/completions
    forbidden_paths:
      - .env
      - secrets
      - private
      - runtime/production
    acceptance_criteria:
      - The scoped change is implemented.
      - No patches are applied automatically by the chain.
    test_commands:
      - python -m pytest examples/fake-app/tests
    proof_required:
      - context_pack.md
      - receipt.json
    stop_conditions:
      - Dependency receipt has a blocker.
      - Forbidden path or private data would be touched.
  - goal_id: validate_and_receipt
    title: Validate and receipt
    objective: Run validation and summarize the chain proof.
    workflow: validation
    lane: demo
    depends_on:
      - implement_small_change
    allowed_paths:
      - examples/fake-app
      - runs/build_chains
      - reports/completions
    forbidden_paths:
      - .env
      - secrets
      - private
      - runtime/production
    acceptance_criteria:
      - Configured tests pass or blockers are documented.
      - Chain status and completion artifacts are present.
    test_commands:
      - python -m pytest examples/fake-app/tests
    proof_required:
      - context_pack.md
      - receipt.json
      - chain_completion.md
    stop_conditions:
      - Validation fails without a documented blocker.
      - Receipt proof is missing.
